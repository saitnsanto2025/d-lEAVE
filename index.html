<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave Application Form</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 30px 20px;
      background: white;
      border-bottom: 1px solid #e9ecef;
    }

    .logo {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo img {
      height: 70px;
      width: auto;
      display: block;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #2d3436;
    }

    .header p {
      color: #636e72;
      font-size: 14px;
    }

    .form-container {
      padding: 30px;
    }

    .section {
      margin-bottom: 32px;
    }

    .section-header {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
      color: #2d3436;
    }

    .section-icon {
      width: 24px;
      height: 24px;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6c5ce7;
      flex-shrink: 0;
    }

    .section-icon svg {
      width: 20px;
      height: 20px;
      fill: #6c5ce7;
      stroke: none;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .section-subtitle {
      color: #636e72;
      font-size: 13px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
      align-items: start;
    }

    .form-group {
      position: relative;
      width: 100%;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #2d3436;
      font-size: 14px;
    }

    .required {
      color: #e17055;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      background: #f8f9fa;
      color: #636e72;
      font-family: inherit;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      background: #f1f3f4;
    }

    select {
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236c5ce7' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 12px center;
      background-repeat: no-repeat;
      background-size: 16px;
      padding-right: 40px;
    }

    .submit-btn {
      background: #6c5ce7;
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 24px;
      width: 100%;
    }

    .submit-btn:hover {
      background: #5a4fcf;
    }

    @media (max-width: 640px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .form-container {
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <img src="https://raw.githubusercontent.com/saitnsanto2025/logic/refs/heads/main/Logo-dark%20(1).png" alt="DCash Logo" />
      </div>

      <h1>LEAVE APPLICATION</h1>
      <p>Please complete all required fields and an email will be sent to your company having your Leave form ready </p>
    </div>

    <div class="form-container">
      <form id="leaveForm">
        <div class="section">
          <div class="section-header">
            <div class="section-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" />
              </svg>
            </div>

            <div>
              <div class="section-title">Personal Details</div>
              <div class="section-subtitle">Your personal details</div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group full-width">
              <label for="applicantEmail">
                Your company email address <span class="required">*</span>
              </label>

              <select name="applicantEmail" id="applicantEmail" required>
                <option value="">Select your email</option>

                <option value="shiku.muchoki@dcash.africa">shiku.muchoki@dcash.africa</option>
                <option value="peter.kayere@dcash.africa">peter.kayere@dcash.africa</option>
                <option value="paul.wahome@dcash.africa">paul.wahome@dcash.africa</option>
                <option value="liz.wangechi@dcash.africa">liz.wangechi@dcash.africa</option>
                <option value="lenny.steve@dcash.co.ke">lenny.steve@dcash.co.ke</option>
                <option value="bridgetwanjiku@dcash.co.ke">bridgetwanjiku@dcash.co.ke</option>
                <option value="charlottemumbi@dcash.co.ke">charlotte.mumbi@dcash.co.ke</option>
                <option value="ritamargret@dcash.co.ke">ritamargret@dcash.co.ke</option>
                <option value="mike.muiruri@dcash.co.ke">mike.muiruri@dcash.co.ke</option>
                <option value="victor.mwakireti@dcash.co.ke">victor.mwakireti@dcash.co.ke</option>
                <option value="ian.masae@dcash.co.ke">ian.masae@dcash.co.ke</option>
                <option value="stephen.agai@dcash.co.ke">stephen.agai@dcash.co.ke</option>
                <option value="victor.kilyungi@dcash.co.ke">victor.kilyungi@dcash.co.ke</option>
                <option value="daniel.dawe@dcash.co.ke">daniel.dawe@dcash.co.ke</option>
                <option value="robinson.muhia@dcash.co.ke">robinson.muhia@dcash.co.ke</option>
                <option value="ephraim.kisaka@dcash.co.ke">ephraim.kisaka@dcash.co.ke</option>
                <option value="alex.njoroge@dcash.co.ke">alex.njoroge@dcash.co.ke</option>
                <option value="lina.muthoni@dcash.co.ke">lina.muthoni@dcash.co.ke</option>
                <option value="cecily.wahome@dcash.co.ke">cecily.wahome@dcash.co.ke</option>
                <option value="geoffrey.k.omukuba@dcash.co.ke">geoffrey.k.omukuba@dcash.co.ke</option>
              </select>
            </div>
          </div>
        </div>

        <input type="hidden" id="daysRequested" name="daysRequested" value="0" />
        <input type="hidden" id="datesToSubmit" name="datesToSubmit" value="" />

        <button type="submit" class="submit-btn">Submit Application</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById("leaveForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const btn = document.querySelector(".submit-btn");
      const originalText = btn.textContent;

      btn.textContent = "Submitting...";
      btn.disabled = true;

      const data = Object.fromEntries(new FormData(e.target).entries());

      try {
        const res = await fetch("https://dhrx9wkc.rpcld.co/webhook/emails", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          alert("Form submitted successfully!");
          e.target.reset();
        } else {
          alert("Submission failed.");
        }
      } catch (err) {
        alert("Network error — check your connection.");
      }

      btn.textContent = originalText;
      btn.disabled = false;
    });
  </script>
</body>
</html>
